apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: secure-payment

resources:
  - ../../base

patches:
  # Production-specific patches can be added here
  # Example: increase replicas, adjust resources, add HPA
  - target:
      kind: Deployment
      name: secure-payment-platform
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
