# ============================================================================
# Kyverno Policy: Require SLSA Provenance Attestation
# ============================================================================
# Enforces that images must have a valid SLSA provenance attestation
# generated by the slsa-github-generator (trusted builder).
#
# What this proves:
# - The image was built by an automated, isolated CI/CD pipeline
# - The source code came from the expected GitHub repository
# - No manual intervention occurred during the build process
# - The build environment was not tampered with
#
# This is the KEY differentiator for SLSA Level 3:
# Provenance is generated by a SEPARATE, ISOLATED builder that
# the developer cannot modify — even if their GitHub account is compromised.
# ============================================================================

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-slsa-provenance
  annotations:
    policies.kyverno.io/title: Require SLSA Level 3 Provenance
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Ensures all container images have a valid SLSA Level 3 provenance
      attestation from the slsa-github-generator trusted builder.
spec:
  validationFailureAction: Enforce
  background: true
  webhookTimeoutSeconds: 30

  rules:
    - name: verify-slsa-provenance
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - secure-payment
      verifyImages:
        - imageReferences:
            - "ghcr.io/rap1p1/*"
          attestations:
            - type: "https://slsa.dev/provenance/v1"
              attestors:
                - count: 1
                  entries:
                    - keyless:
                        # The SLSA generator signs with its own identity
                        issuer: "https://token.actions.githubusercontent.com"
                        subjectRegExp: "https://github.com/slsa-framework/slsa-github-generator/.*"
                        rekor:
                          url: "https://rekor.sigstore.dev"
              conditions:
                - all:
                    # Verify the build was triggered from our repository
                    - key: "{{ buildDefinition.externalParameters.source.uri }}"
                      operator: Equals
                      value: "git+https://github.com/rap1p1/secure-payment-platform@refs/heads/main"
          required: true
